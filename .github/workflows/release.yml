name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Check Node and npm versions
        run: |
          node --version
          npm --version
      - run: pnpm install --frozen-lockfile
      - name: Check tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "package.json version $VERSION does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
      - name: Check npm version is unpublished
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "toolcapsule@$VERSION" version >/dev/null 2>&1; then
            echo "toolcapsule@$VERSION already exists on npm"
            exit 1
          fi
      - run: pnpm run ci
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --tag alpha
          else
            npm publish --access public --tag latest
          fi
      - name: Verify npm publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for attempt in 1 2 3 4 5 6; do
            if npm view "toolcapsule@$VERSION" name version bin; then
              exit 0
            fi
            echo "npm registry has not returned toolcapsule@$VERSION yet; retry $attempt/6"
            sleep 10
          done
          exit 1
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
